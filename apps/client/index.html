<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!--
      Default theme-color is the handheld register (cream) because Home and
      every player-side route render there regardless of OS preference. The
      host stage register is class-driven, so RoomLayout swaps this value
      to slate-navy when role === "host" and restores it on unmount.
      Keying on prefers-color-scheme here would let the OS chrome color
      disagree with the actual page register.
    -->
    <meta name="theme-color" content="#faf6f1" />

    <title>QR Relay</title>
    <meta name="description" content="スマホをかざし合って遊ぶ運動会ツール。" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QR Relay" />
    <meta property="og:title" content="QR Relay" />
    <meta property="og:description" content="スマホをかざし合って遊ぶ運動会ツール。" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="QR Relay" />
    <meta property="og:locale" content="ja_JP" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QR Relay" />
    <meta name="twitter:description" content="スマホをかざし合って遊ぶ運動会ツール。" />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
