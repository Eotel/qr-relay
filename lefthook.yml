## Lefthook config — fast pre-commit / pre-push checks.
## Docs: https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,css}"
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    - name: secretlint
      run: pnpm exec secretlint --maskSecrets {staged_files}

pre-push:
  parallel: false
  jobs:
    - name: typecheck
      run: pnpm typecheck

    - name: test
      run: pnpm test
